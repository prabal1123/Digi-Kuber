{% load static %}
<!DOCTYPE html>
<html>
<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>DigiKuber</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">


    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/navbar.css' %}">

    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

    
  <style>
  /* CTA Card Styles */
  .cta-card {
    background: radial-gradient(1200px 300px at 50% 40%, rgba(197,157,67,0.06), transparent 20%),
                linear-gradient(180deg, rgba(20,15,5,0.85), rgba(10,8,6,0.9));
    border: 1px solid rgba(197,157,67,0.14);
    border-radius: 18px;
    padding: 3rem;
    transition: transform .25s ease, box-shadow .25s ease;
  }
  .cta-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 18px 40px rgba(197,157,67,0.12);
    border-color: rgba(197,157,67,0.35);
  }

  /* CTA Buttons */
  .btn-gold {
    background: linear-gradient(90deg,#f4c542,#d09a26);
    border: none;
    color:#111;
  }
  .btn-outline-darkgold {
    border:1px solid rgba(197,157,67,0.25);
    color:#ddd;
    background: transparent;
  }

  /* Feature Card Hover Effects */
  .feature-card {
    transition: all 0.3s ease;
  }
  .feature-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 0 20px rgba(197,157,67,0.45);
    border-color: #c59d43 !important;
  }
</style>

</head>

<body>

    <!-- FULL-WIDTH NAVBAR -->
    {% include "nav.html" %}

    <!-- ALERT MESSAGES OUTSIDE CONTAINER (OPTIONAL) -->
    {% if messages %}
        <div class="container mt-3">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <!-- PAGE CONTENT (NO CONTAINER HERE) -->
    {% block content %}{% endblock %}

    <!-- FLOATING WHATSAPP BUTTON -->
    <a href="https://wa.me/+919999106669?text=Hi!%20I%20have%20a%20question%20about%20DigiKuber." 
       class="whatsapp-float" 
       target="_blank" 
       rel="noopener noreferrer"
       title="Chat with us on WhatsApp">
        <i class="bi bi-whatsapp"></i>
    </a>

    <!-- Script tag here  -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
